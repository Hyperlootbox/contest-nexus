<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contest Nexus</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="top">
    <h1>Contest Nexus</h1>
    <p>A searchable archive of contest math problems and solutions.</p>
  </header>

  <main class="container">
    <section class="controls">
      <input id="search" type="text" placeholder="Search by title">
    </section>

    <section class="expression-panel">
      <div class="expression-header">
        <h2>Topic expression</h2>
        <div class="expression-actions">
          <button id="backspaceBtn" class="secondary-btn" type="button">Backspace</button>
          <button id="clearTopicsBtn" class="clear-btn" type="button">Clear</button>
        </div>
      </div>

      <div class="topic-input-wrap">
        <div id="topicSuggestions" class="topic-suggestions hidden"></div>
        <input id="topicInput" class="topic-input" type="text" spellcheck="false" autocomplete="off"
          placeholder="Type a topic expression, like: Area OR Triangle Geometry AND Coordinate Geometry">
      </div>
      <div id="topicStatus" class="topic-status">
        Precedence: parentheses, AND, OR.
      </div>
      <div class='topic-top-buttons'>
        <div id="fieldTabs" class="field-tabs"></div>
        <div class="operator-row">
          <button id="andBtn" class="builder-btn" type="button">AND</button>
          <button id="orBtn" class="builder-btn" type="button">OR</button>
          <button id="openParenBtn" class="builder-btn" type="button">(</button>
          <button id="closeParenBtn" class="builder-btn" type="button">)</button>
        </div>
      </div>

      <p class="topic-help">
        Click topics to insert them at the cursor position in the topic expression box.
      </p>

      <div id="topicPills" class="topic-pills"></div>
      <div class="difficulty-panel">
        <div class="difficulty-label-row">
          <span class="difficulty-label">Difficulty range</span>
          <span id="difficultyRangeText" class="difficulty-range-text">1 to 60</span>
        </div>

        <div class="dual-range">
          <div class="dual-range-track"></div>
          <div id="dualRangeFill" class="dual-range-fill"></div>

          <input id="difficultyMin" class="range-input" type="range" min="1" max="60" step="1" value="1">
          <input id="difficultyMax" class="range-input" type="range" min="1" max="60" step="1" value="60">
        </div>
      </div>
    </section>

    <section id="problemList" class="problem-list"></section>
  </main>

  <script src="main.js"></script>
</body>

</html>
